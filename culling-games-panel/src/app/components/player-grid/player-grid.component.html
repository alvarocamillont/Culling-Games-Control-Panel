<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
  @for (player of players(); track player.id) {
    @let isAlive = player.status === 'Alive';
    <div 
      [class]="'bg-zinc-900 border border-zinc-800 p-5 rounded-lg flex flex-col shadow-lg border-l-4 ' + 
               (isAlive ? 'border-l-emerald-500 hover:border-purple-600/60' : 'border-l-red-500 opacity-65 hover:opacity-85') + 
               ' transition-all duration-300 hover:shadow-[0_0_20px_rgba(139,92,246,0.12)]'"
    >
      <!-- Card Header -->
      <div class="flex justify-between items-start mb-2">
        <h3 [class]="'text-zinc-100 font-bold text-base ' + (isAlive ? '' : 'line-through text-zinc-500')">
          {{ player.name }}
        </h3>
        <button 
          (click)="onToggleStatus(player.id)" 
          [class]="'flex items-center gap-1.5 px-2.5 py-1 rounded text-[9px] font-mono uppercase tracking-widest border transition duration-200 cursor-pointer ' + 
                   (isAlive ? 'bg-emerald-950/20 border-emerald-900/50 text-emerald-400 hover:bg-emerald-900/35' : 
                              'bg-red-950/20 border-red-900/50 text-red-400 hover:bg-red-900/35')"
          title="Toggle Life Status"
        >
          <span [class]="'w-1.5 h-1.5 rounded-full ' + (isAlive ? 'bg-emerald-400 active-pulse' : 'bg-red-500')"></span>
          <span>{{ player.status }}</span>
        </button>
      </div>

      <!-- Colony Title -->
      <span class="text-[9px] uppercase text-zinc-500 tracking-widest mb-3 block font-mono">
        {{ player.colony }}
      </span>

      <!-- Technique Specification -->
      <p class="text-zinc-400 text-xs leading-normal bg-zinc-950/40 border border-zinc-850/80 p-2.5 rounded font-sans min-h-[48px] mb-4">
        @if (player.technique) {
          {{ player.technique }}
        } @else {
          <span class="text-zinc-600 italic">No declared Cursed Technique</span>
        }
      </p>

      <!-- Point Display and quick actions -->
      <div class="mt-auto pt-4 border-t border-zinc-800/60 flex items-center justify-between">
        <div>
          <span class="text-[9px] uppercase text-zinc-500 tracking-widest block font-mono">Points</span>
          <div [class]="'text-3xl font-mono ' + (isAlive ? 'text-purple-400' : 'text-zinc-600') + ' font-black'">
            {{ player.points }}
          </div>
        </div>
        
        <div class="flex items-center gap-1">
          @if (isAlive) {
            <button 
              (click)="onAdjustPoints(player.id, -1)"
              class="bg-zinc-950 border border-zinc-800 hover:bg-zinc-800 text-zinc-400 hover:text-zinc-250 px-2.5 py-1.5 rounded text-[10px] font-mono transition cursor-pointer"
              title="-1 Point"
            >
              -1 PTS
            </button>
            <button 
              (click)="onAdjustPoints(player.id, 1)"
              class="bg-zinc-950 border border-zinc-800 hover:bg-zinc-850 text-purple-400 hover:text-purple-300 px-2.5 py-1.5 rounded text-[10px] font-mono transition cursor-pointer"
              title="+1 Point"
            >
              +1 PTS
            </button>
          } @else {
            <button 
              class="bg-zinc-950/50 border border-zinc-800/50 px-4 py-1.5 rounded text-[10px] font-mono text-zinc-700 cursor-not-allowed uppercase"
              disabled
            >
              LOCKED
            </button>
          }
          
          <!-- Eradicate/Delete Button -->
          <button 
            (click)="onDeletePlayer(player.id)"
            class="bg-zinc-950 border border-zinc-800 hover:border-red-950/60 hover:text-red-400 text-zinc-600 p-1.5 rounded transition cursor-pointer"
            title="Eradicate Sorcerer"
          >
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
            </svg>
          </button>
        </div>
      </div>
    </div>
  }
</div>
